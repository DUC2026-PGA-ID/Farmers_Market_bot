services:
  - type: web
    name: farmers-market-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 30 --keep-alive 5
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: WEBHOOK_PATH
        value: /telegram/webhook
      - key: AUTO_SET_WEBHOOK
        value: "true"
